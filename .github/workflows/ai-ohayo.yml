name: ai-ohayo

on:
  schedule:
    - cron: "0 20 * * *" # UTC 20:00 = JST 05:00
  workflow_dispatch:

permissions:
  contents: write

env:
  FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}/.mise.toml

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec tsx src/digest.ts

      - name: Commit and push delivered.json
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/delivered.json
          if git diff --staged --quiet; then
            echo "No changes to delivered.json"
          else
            git commit -m "chore: delivered.json を更新"
            git push
          fi
